<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم - حالة الطلب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #041024; /* كحلي غامق جداً للخلفية */
            --secondary-color: #0b2046; /* كحلي أفتح قليلاً للبطاقة */
            --accent-color: #4da8da; /* لون مميز للأزرار والتنبيهات */
            --text-color: #ffffff;
        }

        body {
            background-color: var(--primary-color);
            color: var(--text-color);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .dashboard-container {
            background-color: var(--secondary-color);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #1a3668;
        }

        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            color: var(--accent-color);
        }

        .search-type {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            background: #061633;
            padding: 10px;
            border-radius: 10px;
        }

        .search-type label {
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            text-align: right;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1a3668;
            background-color: #041024;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            font-family: 'Tajawal', sans-serif;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .hint {
            font-size: 12px;
            color: #a0b2c6;
            margin-top: 8px;
            display: block;
            line-height: 1.5;
        }

        .btn-search {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-search:hover {
            background-color: #388dbd;
            color: #fff;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background-color: #041024;
            border: 1px solid var(--accent-color);
            display: none;
            font-size: 16px;
            line-height: 1.6;
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <img src="logo1.png" alt="شعار الشركة" class="logo">
        
        <h2>الاستعلام عن حالة الطلب</h2>

        <div class="search-type">
            <label>
                <input type="radio" name="searchBy" value="order" checked onchange="toggleInput()"> برقم الطلب
            </label>
            <label>
                <input type="radio" name="searchBy" value="phone" onchange="toggleInput()"> برقم الجوال
            </label>
        </div>

        <div class="input-group" id="orderInputGroup">
            <label>رقم الطلب:</label>
            <input type="text" id="orderNumber" placeholder="أدخل رقم الطلب هنا...">
        </div>

        <div class="input-group" id="phoneInputGroup" style="display: none;">
            <label>رقم الجوال:</label>
            <input type="text" id="phoneNumber" placeholder="مثال: 5XXXXXXXX">
            <span class="hint">⚠️ تنبيه: يرجى إدخال رقم الجوال بدون مسافات، ولا يبدأ بـ 0 أو 966. يجب أن يبدأ برقم 5.</span>
        </div>

        <button class="btn-search" onclick="performSearch()">بحث عن الطلب</button>

        <div class="loader" id="loader"></div>
        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        // رابط الـ API الذي سنقوم بإنشائه في الخطوة الثانية
        const API_URL = "ضع_رابط_سكربت_جوجل_هنا";

        function toggleInput() {
            const searchBy = document.querySelector('input[name="searchBy"]:checked').value;
            document.getElementById('orderInputGroup').style.display = searchBy === 'order' ? 'block' : 'none';
            document.getElementById('phoneInputGroup').style.display = searchBy === 'phone' ? 'block' : 'none';
            document.getElementById('resultBox').style.display = 'none';
        }

        async function performSearch() {
            const searchBy = document.querySelector('input[name="searchBy"]:checked').value;
            let searchValue = "";

            if (searchBy === 'phone') {
                searchValue = document.getElementById('phoneNumber').value.trim();
                // التحقق من صحة رقم التليفون حسب شروطك
                if (searchValue.includes(" ") || searchValue.startsWith("0") || searchValue.startsWith("966") || !searchValue.startsWith("5")) {
                    showResult("❌ عذراً، يجب إدخال رقم الجوال بدون مسافات، وبدون 0 أو 966، ويجب أن يبدأ برقم 5.");
                    return;
                }
            } else {
                searchValue = document.getElementById('orderNumber').value.trim();
                if (!searchValue) {
                    showResult("❌ يرجى إدخال رقم الطلب.");
                    return;
                }
            }

            // إظهار التحميل
            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';

            try {
                // إرسال الطلب لجوجل سكربت
                const response = await fetch(`${API_URL}?type=${searchBy}&value=${searchValue}`);
                const data = await response.json();
                
                showResult(data.message);
            } catch (error) {
                showResult("❌ حدث خطأ في الاتصال بالخوادم. يرجى التأكد من الرابط أو المحاولة لاحقاً.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function showResult(message) {
            const resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = message;
            resultBox.style.display = 'block';
        }
    </script>

</body>
</html>
